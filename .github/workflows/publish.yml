# Publish to npm via OIDC (Trusted Publisher).
# Setup: npm package → Settings → Trusted Publisher → GitHub Actions
#   user: LeMinhSang2k5, repo: ready-for-agents, workflow: publish.yml
name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version from package.json "packageManager" (do not set version here too)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "const pkg=require('./package.json'); const expected='v'+pkg.version; const actual=process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error('Tag/version mismatch: expected '+expected+' from package.json, got '+actual); process.exit(1); }"

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - run: pnpm publish --access public --no-git-checks --provenance
